name: Backup semanal de base de datos

on:
  schedule:
    - cron: '0 3 * * 0'  # Domingos 3am UTC
  workflow_dispatch:      # Permite disparo manual desde GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Verificar secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "ERROR: El secret SUPABASE_SERVICE_ROLE_KEY no está configurado en GitHub."
            echo "Andá a Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "Secrets OK."

      - name: Exportar tablas y subir backup
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 - <<'PYEOF'
          import json, gzip, io, os, sys
          from urllib import request, error
          from datetime import datetime, timezone

          SUPABASE_URL = "https://pdkxensiphkbfxzcundb.supabase.co"
          KEY = os.environ["SUPABASE_SERVICE_ROLE_KEY"]

          TABLES = [
              "clubs", "profiles", "sedes", "jugadores", "asistencias",
              "categorias", "tipos_evaluacion", "evaluaciones", "cuotas",
              "audit_log", "turnos_alquiler", "turnos_escuela",
          ]

          def get_table(table):
              req = request.Request(
                  f"{SUPABASE_URL}/rest/v1/{table}?select=*&limit=100000",
                  headers={
                      "Authorization": f"Bearer {KEY}",
                      "apikey": KEY,
                      "Accept": "application/json",
                  },
              )
              with request.urlopen(req) as resp:
                  return json.loads(resp.read())

          print("==> Exportando tablas...")
          backup = {}
          total_rows = 0
          for table in TABLES:
              rows = get_table(table)
              backup[table] = rows
              total_rows += len(rows)
              print(f"    {table}: {len(rows)} filas")

          print(f"    Total: {total_rows} filas")

          # Comprimir
          buf = io.BytesIO()
          with gzip.GzipFile(fileobj=buf, mode="wb") as gz:
              gz.write(json.dumps(backup, ensure_ascii=False, default=str).encode("utf-8"))
          compressed = buf.getvalue()

          timestamp = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          filename = f"backup_{timestamp}.json.gz"
          size_kb = len(compressed) / 1024
          print(f"==> Comprimido: {filename} ({size_kb:.1f} KB)")

          # Subir a Supabase Storage
          print("==> Subiendo a Supabase Storage...")
          upload_req = request.Request(
              f"{SUPABASE_URL}/storage/v1/object/backups/{filename}",
              data=compressed,
              headers={
                  "Authorization": f"Bearer {KEY}",
                  "Content-Type": "application/gzip",
              },
              method="POST",
          )
          try:
              with request.urlopen(upload_req) as resp:
                  result = json.loads(resp.read())
              print(f"==> Backup subido correctamente: {filename}")
              print(f"    Key: {result.get('Key', result)}")
          except error.HTTPError as e:
              body = e.read().decode()
              print(f"Error al subir (HTTP {e.code}): {body}")
              sys.exit(1)
          PYEOF

      - name: Eliminar backups de más de 60 días
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          from datetime import datetime, timedelta, timezone
          from urllib import request, error

          SUPABASE_URL = "https://pdkxensiphkbfxzcundb.supabase.co"
          KEY = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          cutoff = datetime.now(timezone.utc) - timedelta(days=60)

          headers = {
              "Authorization": f"Bearer {KEY}",
              "Content-Type": "application/json",
          }

          data = json.dumps({"limit": 200, "offset": 0, "prefix": ""}).encode()
          req = request.Request(
              f"{SUPABASE_URL}/storage/v1/object/list/backups",
              data=data,
              headers=headers,
          )
          try:
              with request.urlopen(req) as resp:
                  objects = json.loads(resp.read())
          except error.HTTPError as e:
              print(f"Error al listar backups (HTTP {e.code}): {e.read().decode()}")
              sys.exit(1)

          to_delete = []
          for obj in objects:
              name = obj.get("name", "")
              try:
                  date_str = name.removeprefix("backup_").removesuffix(".json.gz")
                  file_date = datetime.strptime(date_str, "%Y-%m-%d").replace(tzinfo=timezone.utc)
                  if file_date < cutoff:
                      to_delete.append(name)
              except Exception:
                  pass

          if not to_delete:
              print("No hay backups viejos para eliminar.")
              sys.exit(0)

          data = json.dumps({"prefixes": to_delete}).encode()
          req = request.Request(
              f"{SUPABASE_URL}/storage/v1/object/backups",
              data=data,
              headers=headers,
              method="DELETE",
          )
          try:
              with request.urlopen(req) as resp:
                  result = json.loads(resp.read())
              print(f"Eliminados ({len(to_delete)}): {to_delete}")
          except error.HTTPError as e:
              print(f"Error al eliminar backups (HTTP {e.code}): {e.read().decode()}")
              sys.exit(1)
          PYEOF
